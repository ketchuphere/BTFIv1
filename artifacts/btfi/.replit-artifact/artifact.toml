kind = "web"
previewPath = "/"
title = "BTFI — Bengaluru Traffic Flow Intelligence"
version = "1.0.0"
id = "artifacts/btfi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25331

[services.development]
run = "pnpm --filter @workspace/btfi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/btfi", "run", "build" ]
publicDir = "artifacts/btfi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25331"
BASE_PATH = "/"
